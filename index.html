<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingress Glyph Practice</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070a0c;
      --panel: #111820;
      --panel-soft: #17212b;
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef5f2;
      --muted: #8ea19b;
      --green: #43e061;
      --cyan: #45d9ff;
      --amber: #f0b94a;
      --danger: #ff6871;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 15% 0%, rgba(67, 224, 97, 0.16), transparent 28rem),
        linear-gradient(135deg, #070a0c 0%, #101417 52%, #060909 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: clamp(12px, 2.5vw, 28px);
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .app {
      width: min(980px, 100%);
      min-height: calc(100vh - clamp(24px, 5vw, 56px));
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      background: rgba(17, 24, 32, 0.9);
      backdrop-filter: blur(14px);
      border-radius: 8px;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.05rem, 2.5vw, 1.55rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .status {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .length-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .length-option {
      position: relative;
    }

    .length-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .length-option span,
    .icon-button,
    .sequence-button,
    .back-button,
    .speak-button {
      border: 1px solid var(--line);
      background: rgba(23, 33, 43, 0.92);
      border-radius: 8px;
    }

    .length-option span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 62px;
      height: 38px;
      padding: 0 12px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .length-option input:checked + span {
      color: #051008;
      background: var(--green);
      border-color: rgba(67, 224, 97, 0.8);
      box-shadow: 0 0 18px rgba(67, 224, 97, 0.24);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      min-height: 0;
    }

    .practice,
    .results {
      min-width: 0;
      border: 1px solid var(--line);
      background: rgba(17, 24, 32, 0.92);
      border-radius: 8px;
      overflow: hidden;
    }

    .practice {
      display: grid;
      grid-template-rows: 1fr auto;
      align-items: center;
      justify-items: center;
      padding: clamp(12px, 2.4vw, 22px);
      gap: 12px;
    }

    .canvas-shell {
      width: min(100%, 48vh, 480px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    #glyphCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .toolbar {
      width: min(100%, 560px);
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .icon-button,
    .back-button,
    .speak-button {
      min-height: 40px;
      padding: 0 14px;
      cursor: pointer;
    }

    .icon-button:hover,
    .back-button:hover,
    .speak-button:hover,
    .sequence-button:hover {
      border-color: rgba(67, 224, 97, 0.55);
    }

    .speak-button {
      width: 42px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      line-height: 1;
    }

    .speak-button.active {
      color: #051008;
      background: var(--green);
      border-color: rgba(67, 224, 97, 0.8);
      box-shadow: 0 0 18px rgba(67, 224, 97, 0.24);
    }

    .speak-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .results {
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-height: 46vh;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(23, 33, 43, 0.65);
    }

    .matched-name {
      min-width: 0;
      font-size: clamp(1rem, 2.4vw, 1.28rem);
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .matched-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .counter {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .results-body {
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .empty {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      padding: 18px;
    }

    .sequence-list {
      display: grid;
      gap: 10px;
    }

    .sequence-button {
      width: 100%;
      min-height: 86px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
      cursor: pointer;
    }

    .sequence-button.selected {
      cursor: default;
      border-color: rgba(67, 224, 97, 0.75);
      background: rgba(67, 224, 97, 0.1);
    }

    .glyph-card {
      width: clamp(50px, 12vw, 72px);
      flex: 0 0 auto;
      display: grid;
      justify-items: center;
      gap: 4px;
    }

    .glyph-svg {
      width: 100%;
      aspect-ratio: 1;
      display: block;
    }

    .glyph-word {
      width: 100%;
      min-height: 2.2em;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      text-align: center;
      text-transform: uppercase;
      color: var(--text);
      font-size: clamp(0.58rem, 1.6vw, 0.72rem);
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .glyph-card:first-child .glyph-word {
      color: var(--green);
      font-weight: 800;
    }

    .arrow {
      flex: 0 0 auto;
      color: var(--amber);
      font-weight: 800;
      transform: translateY(-0.8rem);
    }

    .selected-wrap {
      display: grid;
      gap: 12px;
    }

    .selected-actions {
      display: flex;
      justify-content: flex-start;
      gap: 8px;
    }

    .credit-footer {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
      text-align: center;
      padding: 2px 10px 0;
    }

    .credit-footer a {
      color: var(--cyan);
      text-decoration: none;
    }

    .credit-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 820px) {
      body {
        padding: 10px;
      }

      .app {
        min-height: calc(100vh - 20px);
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .length-filters {
        justify-content: stretch;
      }

      .length-option {
        flex: 1 1 0;
      }

      .length-option span {
        width: 100%;
      }

      .canvas-shell {
        width: min(100%, 74vw, 440px);
      }

      .results {
        min-height: 42vh;
        max-height: none;
      }
    }

    @media (max-width: 480px) {
      .result-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .sequence-button {
        overflow-x: auto;
      }

      .glyph-card {
        width: 54px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="Glyph practice settings">
      <div class="brand">
        <h1>Ingress Glyph Practice</h1>
        <div id="status" class="status">画出第一个 Glyph，下面会显示可选序列</div>
      </div>

      <div class="length-filters" aria-label="选择序列长度">
        <label class="length-option">
          <input type="checkbox" name="length" value="3">
          <span>3 图</span>
        </label>
        <label class="length-option">
          <input type="checkbox" name="length" value="4">
          <span>4 图</span>
        </label>
        <label class="length-option">
          <input type="checkbox" name="length" value="5" checked>
          <span>5 图</span>
        </label>
      </div>
    </section>

    <section class="layout">
      <div class="practice">
        <div class="canvas-shell">
          <canvas id="glyphCanvas" aria-label="Glyph drawing pad"></canvas>
        </div>
        <div class="toolbar">
          <button id="clearButton" class="icon-button" type="button">清空</button>
        </div>
      </div>

      <aside class="results" aria-label="Candidate sequences">
        <div class="result-header">
          <div class="matched-title">
            <div id="matchedName" class="matched-name">等待绘制</div>
            <button id="glyphSpeakButton" class="speak-button" type="button" aria-label="Enable reading">🔇</button>
            <button id="glyphRepeatButton" class="speak-button repeat-button" type="button" aria-label="Repeat current glyph">↻</button>
          </div>
          <div id="counter" class="counter">0 条</div>
        </div>
        <div id="resultsBody" class="results-body">
          <div class="empty">按住并连线画出一个 Glyph。识别成功后，这里会列出以它开头的序列。</div>
        </div>
      </aside>
    </section>

    <footer class="credit-footer">
      <div>
        Glyph data and interaction concept adapted from
        <a href="https://github.com/MarsianCreator/INGRESS-GUIDE" target="_blank" rel="noopener noreferrer">MarsianCreator/INGRESS-GUIDE</a>.

        Project repository:

      </div>
    </footer>
  </main>

"Destiny"],["XM","Path","Future","Destiny","Harmony"],["XM","Portal","Share","Your","Creativity"],["You","Hide","Chaos","Inside","Body"],["Your","Message","Clear","Use","Chaos"],["Resistance","Gain","All","Victory","Osiris"],["Human","Potential","Evolution","Unbounded"],["Escape","Speed","Barrier"],["Gain","More","Speed"],["Speed","Equal","Key"],["More","Speed","More","Potential"],["Use","Speed","Pure","Key"],["Self","Less","Together","Speed"],["Refresh","Nourish","Recharge"],["Refresh","Change","Perspective"],["Refresh","Old","Discover","New"],["Refresh","Technology","Gain","More","Speed"],["Refresh","Mind","Refresh","Body"],["Save","Before","Refresh"],["You","Refresh","Us"],["Abandon","Restraint","Pursue","Speed","Together"],["Pursue","Human","Potential","Evolution","Unbounded"],["Pursue","Human","Potential","Evolution"],["Pursue","Human","Potential"]];

    const NODE_KEYS = ['m', 'd', 'k', 'c', 'l', 'b', 'r', 'j', 'h', 't', 'a'];

    const state = {

    class GlyphPad {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.nodes = {};
        this.isDrawing = false;
        this.drawnPath = [];
        this.currentPointer = null;
        this.hoveredNode = null;

        this.resize();
        this.bindEvents();
        this.draw();
      }

      resize() {
        const rect = this.canvas.getBoundingClientRect();
        const size = Math.max(260, Math.floor(Math.min(rect.width || 400, rect.height || 400)));
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = Math.floor(size * dpr);
        this.canvas.height = Math.floor(size * dpr);
        this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        this.width = size;
        this.height = size;
        this.cx = size / 2;
        this.cy = size / 2;
        this.radius = size * 0.43;
        this.hitRadius = Math.max(18, size * 0.055);
        this.setupNodes();
        this.draw();
      }

      setupNodes() {
        const k = 0.38;
        const outer = k * 2;
        const inner = k;
        const cos = Math.cos(Math.PI / 6);
        const sin = Math.sin(Math.PI / 6);

        this.nodes = {
          m: { dx: 0, dy: -this.radius * outer },
          d: { dx: cos * this.radius * outer, dy: -sin * this.radius * outer },
          k: { dx: cos * this.radius * outer, dy: sin * this.radius * outer },
          c: { dx: 0, dy: this.radius * outer },
          l: { dx: -cos * this.radius * outer, dy: sin * this.radius * outer },
          b: { dx: -cos * this.radius * outer, dy: -sin * this.radius * outer },
          r: { dx: cos * this.radius * inner, dy: -sin * this.radius * inner },
          j: { dx: cos * this.radius * inner, dy: sin * this.radius * inner },
          h: { dx: -cos * this.radius * inner, dy: sin * this.radius * inner },
          t: { dx: -cos * this.radius * inner, dy: -sin * this.radius * inner },
          a: { dx: 0, dy: 0 }
        };

        for (const key of NODE_KEYS) {
          this.nodes[key].x = this.cx + this.nodes[key].dx;
          this.nodes[key].y = this.cy + this.nodes[key].dy;
        }
      }

      bindEvents() {
        this.canvas.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          this.canvas.setPointerCapture(event.pointerId);
          this.isDrawing = true;
          this.drawnPath = [];
          this.currentPointer = this.getPointerPos(event);
          this.checkNodeCollision(this.currentPointer);
          setDrawingState();
          this.draw();
        });

        this.canvas.addEventListener('pointermove', (event) => {
          if (!this.isDrawing) return;
          event.preventDefault();
          this.currentPointer = this.getPointerPos(event);
          this.checkNodeCollision(this.currentPointer);
          this.draw();
        });

        this.canvas.addEventListener('pointerup', (event) => this.endDrawing(event));
        this.canvas.addEventListener('pointercancel', (event) => this.endDrawing(event));

        window.addEventListener('resize', () => {
          window.requestAnimationFrame(() => this.resize());
        });
      }

      getPointerPos(event) {
        const rect = this.canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        };
      }

      checkNodeCollision(pos) {
        this.hoveredNode = null;

        for (const [key, node] of Object.entries(this.nodes)) {
          const distance = Math.hypot(node.x - pos.x, node.y - pos.y);
          if (distance <= this.hitRadius) {
            this.hoveredNode = key;
            if (this.drawnPath.length === 0 || this.drawnPath[this.drawnPath.length - 1] !== key) {
              this.drawnPath.push(key);
            }
            break;
          }
        }
      }

      endDrawing(event) {
        if (!this.isDrawing) return;
        event.preventDefault();
        this.isDrawing = false;
        this.currentPointer = null;
        this.hoveredNode = null;
        this.draw();
        recognizeGlyph(this.drawnPath);
      }

      clear() {
        this.isDrawing = false;
        this.drawnPath = [];
        this.currentPointer = null;
        this.hoveredNode = null;
        this.draw();
      }

      draw() {
        const ctx = this.ctx;
        if (!ctx) return;
        ctx.clearRect(0, 0, this.width, this.height);
        this.drawHexagon();

        if (this.drawnPath.length > 0) {
          ctx.beginPath();
          ctx.moveTo(this.nodes[this.drawnPath[0]].x, this.nodes[this.drawnPath[0]].y);

          for (let i = 1; i < this.drawnPath.length; i += 1) {
            ctx.lineTo(this.nodes[this.drawnPath[i]].x, this.nodes[this.drawnPath[i]].y);
          }

          if (this.isDrawing && this.currentPointer) {
            ctx.lineTo(this.currentPointer.x, this.currentPointer.y);
          }

          ctx.strokeStyle = COLORS.line;
          ctx.lineWidth = Math.max(4, this.width * 0.011);
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.shadowColor = COLORS.lineGlow;
          ctx.shadowBlur = 14;
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        for (const [key, node] of Object.entries(this.nodes)) {
          const isActive = this.drawnPath.includes(key);
          const isHovered = this.hoveredNode === key;
          ctx.beginPath();
          ctx.fillStyle = isActive || isHovered ? COLORS.nodeActive : COLORS.nodeDefault;
          ctx.shadowColor = isActive ? COLORS.lineGlow : 'transparent';
          ctx.shadowBlur = isActive ? 8 : 0;
          ctx.arc(node.x, node.y, isActive ? 6 : 4.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      drawHexagon() {
        const ctx = this.ctx;
        ctx.beginPath();
        for (let i = 0; i < 6; i += 1) {
          const angle = (Math.PI / 3) * i - Math.PI / 2;
          const x = this.cx + this.radius * Math.cos(angle);
          const y = this.cy + this.radius * Math.sin(angle);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = COLORS.bgHex;
        ctx.fill();
        ctx.strokeStyle = COLORS.hexBorder;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    const pad = new GlyphPad(elements.canvas);

    elements.clearButton.addEventListener('click', () => {
      pad.clear();
      stopSpeech();
      state.matchedGlyph = null;
      state.candidates = [];
      state.selectedSequence = null;
      renderResults();
    });

    elements.glyphSpeakButton.addEventListener('click', () => {
      if (!supportsSpeech()) return;

      state.speechEnabled = !state.speechEnabled;
      if (state.speechEnabled) {
        speakCurrentTarget();
      } else {
        stopSpeech();
      }
      renderSpeechButton();
    });

    elements.glyphRepeatButton.addEventListener('click', () => {
      repeatCurrentGlyph();
    });

    elements.lengthInputs.forEach((input) => {
      input.addEventListener('change', () => {
        if (selectedLengths().length === 0) {
          input.checked = true;
        }
        if (state.matchedGlyph) {
          updateCandidates();
        }
      });
    });

    function selectedLengths() {
      return elements.lengthInputs
        .filter((input) => input.checked)
        .map((input) => Number(input.value));
    }

    function setDrawingState() {
      stopSpeech();
      state.selectedSequence = null;
      elements.status.textContent = '正在绘制...';
      elements.matchedName.textContent = '绘制中';
      elements.counter.textContent = '0 条';
      elements.resultsBody.innerHTML = '<div class="empty">松开后会识别当前 Glyph。</div>';
      renderSpeechButton();
    }

    function recognizeGlyph(path) {
      if (path.length < 2) {
        state.matchedGlyph = null;
        state.candidates = [];
        state.selectedSequence = null;
        renderResults();
        return;
      }

      const userSegments = getSegmentsFromPath(path);
      const match = glyphsWithSegments.find((glyph) =>
        glyph.segments.length === userSegments.length &&
        glyph.segments.every((segment, index) => segment === userSegments[index])
      );

      state.matchedGlyph = match || null;
      state.selectedSequence = null;
      updateCandidates();
      if (state.speechEnabled && match) {
        speakCurrentTarget();
      }
    }

    function updateCandidates() {
      const lengths = selectedLengths();
      if (!state.matchedGlyph) {
        state.candidates = [];
        renderResults();
        return;
      }

      const names = new Set(state.matchedGlyph.name);
      state.candidates = SEQUENCES.filter((sequence) =>
        lengths.includes(sequence.length) && names.has(sequence[0])
      );
      renderResults();
    }

    function renderResults() {
      if (state.selectedSequence) {
        elements.matchedName.textContent = state.selectedSequence.join(' / ');
        elements.counter.textContent = state.selectedSequence.length + ' 图';
        elements.status.textContent = '已锁定候选序列';
        elements.resultsBody.innerHTML =
          '<div class="selected-wrap">' +
            '<div class="selected-actions">' +
              '<button id="backButton" class="back-button" type="button">回退</button>' +
              '<button id="sequenceRepeatButton" class="speak-button repeat-button" type="button" aria-label="Repeat selected sequence twice">↻</button>' +
            '</div>' +
            sequenceHtml(state.selectedSequence, true) +
          '</div>';
        document.getElementById('backButton').addEventListener('click', () => {
          stopSpeech();
          state.selectedSequence = null;
          renderResults();
        });
        document.getElementById('sequenceRepeatButton').addEventListener('click', () => {
          repeatSelectedSequence();
        });
        renderSpeechButton();
        return;
      }

      if (!state.matchedGlyph) {
        elements.matchedName.textContent = '等待绘制';
        elements.counter.textContent = '0 条';
        elements.status.textContent = '画出第一个 Glyph，下面会显示可选序列';
        elements.resultsBody.innerHTML = '<div class="empty">按住并连线画出一个 Glyph。识别成功后，这里会列出以它开头的序列。</div>';
        renderSpeechButton();
        return;
      }

      const name = state.matchedGlyph.name.join(' / ');
      elements.matchedName.textContent = name;
      elements.counter.textContent = state.candidates.length + ' 条';
      elements.status.textContent = state.candidates.length
        ? '识别为 ' + name + '，点击一个序列锁定'
        : '识别为 ' + name + '，当前长度筛选没有候选';

      if (state.candidates.length === 0) {
        elements.resultsBody.innerHTML = '<div class="empty">没有符合当前 3/4/5 图筛选的候选序列。</div>';
        renderSpeechButton();
        return;
      }

      elements.resultsBody.innerHTML =
        '<div class="sequence-list">' +
        state.candidates.map((sequence, index) =>
          '<button class="sequence-button" type="button" data-index="' + index + '">' +
            sequenceInnerHtml(sequence) +
          '</button>'
        ).join('') +
        '</div>';

      elements.resultsBody.querySelectorAll('.sequence-button').forEach((button) => {
        button.addEventListener('click', () => {
          state.selectedSequence = state.candidates[Number(button.dataset.index)];
          renderResults();
          if (state.speechEnabled) {
            speakCurrentTarget();
          }
        });
      });
      renderSpeechButton();
    }

    function getSegmentsFromPath(path) {
      const segments = new Set();
      for (let i = 0; i < path.length - 1; i += 1) {
        const a = path[i];
        const b = path[i + 1];
        segments.add(a < b ? a + b : b + a);
      }
      return Array.from(segments).sort();
    }

    function sequenceHtml(sequence, selected = false) {
      return '<div class="sequence-button ' + (selected ? 'selected' : '') + '">' + sequenceInnerHtml(sequence) + '</div>';
    }

    function sequenceInnerHtml(sequence) {
      return sequence.map((name, index) => {
        const separator = index === sequence.length - 1 ? '' : '<span class="arrow">›</span>';
        return glyphCardHtml(name) + separator;
      }).join('');
    }

    function glyphCardHtml(name) {
      return '<div class="glyph-card">' +
        glyphSvg(name) +
        '<div class="glyph-word">' + escapeHtml(name) + '</div>' +
      '</div>';
    }

    function glyphSvg(name) {
      const glyph = glyphByName.get(name);
      if (!glyph) return '<svg class="glyph-svg" viewBox="0 0 100 100" aria-hidden="true"></svg>';

      const points = glyph.points.split('');
      const nodes = thumbnailNodes();
      const path = points
        .filter((point) => nodes[point])
        .map((point, index) => (index === 0 ? 'M' : 'L') + ' ' + nodes[point].x.toFixed(2) + ' ' + nodes[point].y.toFixed(2))
        .join(' ');
      const hex = hexPath(50, 50, 39);

      return '<svg class="glyph-svg" viewBox="0 0 100 100" aria-hidden="true">' +
        '<path d="' + hex + '" fill="rgba(6, 17, 25, 0.92)" stroke="rgba(69, 217, 255, 0.38)" stroke-width="2"></path>' +
        '<path d="' + path + '" fill="none" stroke="#43e061" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>' +
      '</svg>';
    }

    function thumbnailNodes() {
      const r = 40;
      const cx = 50;
      const cy = 50;
      const k = 0.38;
      const outer = k * 2;
      const inner = k;
      const cos = Math.cos(Math.PI / 6);
      const sin = Math.sin(Math.PI / 6);

      return {
        m: { x: cx, y: cy - r * outer },
        d: { x: cx + cos * r * outer, y: cy - sin * r * outer },
        k: { x: cx + cos * r * outer, y: cy + sin * r * outer },
        c: { x: cx, y: cy + r * outer },
        l: { x: cx - cos * r * outer, y: cy + sin * r * outer },
        b: { x: cx - cos * r * outer, y: cy - sin * r * outer },
        r: { x: cx + cos * r * inner, y: cy - sin * r * inner },
        j: { x: cx + cos * r * inner, y: cy + sin * r * inner },
        h: { x: cx - cos * r * inner, y: cy + sin * r * inner },
        t: { x: cx - cos * r * inner, y: cy - sin * r * inner },
        a: { x: cx, y: cy }
      };
    }

    function hexPath(cx, cy, r) {
      let path = '';
      for (let i = 0; i < 6; i += 1) {
        const angle = (Math.PI / 3) * i - Math.PI / 2;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        path += (i === 0 ? 'M' : 'L') + ' ' + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
      }
      return path + 'Z';
    }

    function supportsSpeech() {
      return 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;
    }

    function renderSpeechButton() {
      const button = elements.glyphSpeakButton;
      if (!button) return;

      const speechSupported = supportsSpeech();
      button.disabled = !speechSupported;
      button.classList.toggle('active', state.speechEnabled);
      button.textContent = state.speechEnabled ? '🔊' : '🔇';
      button.setAttribute('aria-label', state.speechEnabled ? 'Disable reading' : 'Enable reading');
      button.title = speechSupported
        ? (state.speechEnabled ? 'Reading is on' : 'Reading is off')
        : 'Speech synthesis is not supported in this browser';

      if (elements.glyphRepeatButton) {
        elements.glyphRepeatButton.disabled = !speechSupported || !state.matchedGlyph;
        elements.glyphRepeatButton.title = speechSupported
          ? 'Repeat current glyph'
          : 'Speech synthesis is not supported in this browser';
      }

      const sequenceRepeatButton = document.getElementById('sequenceRepeatButton');
      if (sequenceRepeatButton) {
        sequenceRepeatButton.disabled = !speechSupported || !state.selectedSequence;
        sequenceRepeatButton.title = speechSupported
          ? 'Repeat selected sequence twice'
          : 'Speech synthesis is not supported in this browser';
      }
    }

    function speakCurrentTarget() {
      const words = currentSpokenWords();
      if (words.length > 0) {
        speakWords(words);
      }
    }

    function currentSpokenWords() {
      if (state.selectedSequence) return state.selectedSequence;
      if (state.matchedGlyph) return [state.matchedGlyph.name[0]];
      return [];
    }

    function repeatCurrentGlyph() {
      if (state.isSpeaking || !state.matchedGlyph) return;
      speakWords([state.matchedGlyph.name[0]]);
    }

    function repeatSelectedSequence() {
      if (state.isSpeaking || !state.selectedSequence) return;
      speakWords(state.selectedSequence, 2);
    }

    function speakWords(words, repeatCount = 1) {
      if (!supportsSpeech() || !words || words.length === 0) return;

      stopSpeech();
      const runId = state.speechRunId;
      playSpeech(words, repeatCount, runId);
    }

    function playSpeech(words, remaining, runId) {
      const spokenText = words.map(pronounceGlyphWord).join(', ');
      const utterance = new SpeechSynthesisUtterance(spokenText);
      utterance.lang = 'en-US';
      utterance.rate = 0.86;
      utterance.pitch = 1;
      state.isSpeaking = true;
      utterance.onend = () => {
        if (runId !== state.speechRunId) return;
        if (remaining > 1) {
          playSpeech(words, remaining - 1, runId);
        } else {
          state.isSpeaking = false;
        }
      };
      utterance.onerror = () => {
        if (runId !== state.speechRunId) return;
        state.isSpeaking = false;
        state.speechEnabled = false;
        renderSpeechButton();
      };
      window.speechSynthesis.speak(utterance);
    }

    function stopSpeech() {
      state.speechRunId += 1;
      if (supportsSpeech()) {
        window.speechSynthesis.cancel();
      }
      state.isSpeaking = false;
    }

    function pronounceGlyphWord(word) {
      const pronunciations = {
        XM: 'X M',
        "N'Zeer": 'en zeer',
        "n'Zeer": 'en zeer',
        Openall: 'Open All'
      };

      return pronunciations[word] || word;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    renderSpeechButton();
  </script>
</body>
</html>
